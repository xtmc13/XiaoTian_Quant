name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go Backend ──
  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 -race ./internal/...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  # ── TypeScript Frontend ──
  web:
    name: TypeScript Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run

      - name: Build
        run: npm run build

  # ── All Clear ──
  done:
    name: CI Passed
    needs: [go, web]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ All checks passed"

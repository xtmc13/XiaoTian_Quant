name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel redundant workflows on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go Backend ──
  go-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go mod download
      - run: go build ./cmd/server
      - run: go vet ./...
      - run: go test ./internal/... -race -count=1

  # ── Rust Engine ──
  rust-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check
      - run: cargo test
      - run: cargo clippy -- -D warnings

  # ── Frontend ──
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test -- --run

  # ── Docker Build ──
  docker:
    runs-on: ubuntu-latest
    needs: [go-build, rust-build, web-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        # The Dockerfile is in the repo root, use root as context
        # Rust engine is built inside the Dockerfile (stage 0)
        run: |
          docker build -t xiaotian-gateway:latest \
            --build-arg VERSION=${{ github.sha }} \
            -f Dockerfile .
      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config

  # ── Security Scan ──
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Go dependency check
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
        continue-on-error: true
      - run: |
          cd gateway
          go version
          go list -m all 2>/dev/null || echo "Dependencies not auditable in CI"

      - name: Node audit
        uses: actions/setup-node@v4
        with:
          node-version: '22'
        continue-on-error: true
      - run: cd web && npm audit --production --audit-level=moderate 2>/dev/null || true

  # ── Deploy (manual trigger only) ──
  deploy:
    runs-on: ubuntu-latest
    needs: [go-build, rust-build, web-build, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add your deployment script here
          # e.g. ssh, kubectl, or cloud provider CLI

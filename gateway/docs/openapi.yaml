components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 从登录接口获取的 JWT Token

  schemas:
    # ── Auth ──
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: trader001
        password:
          type: string
          format: password
          example: '******'

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT 访问令牌
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    RegisterRequest:
      type: object
      required: [username, password, email]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        email:
          type: string
          format: email
        referral_code:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        nickname:
          type: string
        avatar:
          type: string
        role:
          type: string
          enum: [user, admin, author]
        created_at:
          type: string
          format: date-time

    # ── Market ──
    KlineBar:
      type: object
      properties:
        timestamp:
          type: integer
          description: 毫秒时间戳
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    OrderBook:
      type: object
      properties:
        symbol:
          type: string
        bids:
          type: array
          description: 买单 [[price, quantity], ...]
          items:
            type: array
            items: { type: number }
        asks:
          type: array
          description: 卖单 [[price, quantity], ...]
          items:
            type: array
            items: { type: number }
        timestamp:
          type: integer

    TickerSnapshot:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
        change_24h:
          type: number
        change_pct_24h:
          type: number
        volume_24h:
          type: number
        high_24h:
          type: number
        low_24h:
          type: number

    # ── Orders ──
    PlaceOrderRequest:
      type: object
      required: [symbol, side, type]
      properties:
        symbol:
          type: string
          example: BTCUSDT
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [limit, market]
        price:
          type: number
          description: 限价单必填
        quantity:
          type: number
        quote_order_qty:
          type: number
          description: 市价单按金额买入
        time_in_force:
          type: string
          enum: [GTC, IOC, FOK]
          default: GTC

    OCOOrderRequest:
      type: object
      required: [symbol, side, quantity, price, stopPrice, stopLimitPrice]
      properties:
        symbol: { type: string }
        side: { type: string, enum: [buy, sell] }
        quantity: { type: number }
        price: { type: number, description: 限价单价格 }
        stopPrice: { type: number, description: 触发价 }
        stopLimitPrice: { type: number, description: 止损限价 }

    BracketOrderRequest:
      type: object
      required: [symbol, side, quantity, entry_price, tp_price, sl_price]
      properties:
        symbol: { type: string }
        side: { type: string, enum: [buy, sell] }
        quantity: { type: number }
        entry_price: { type: number }
        tp_price: { type: number, description: 止盈价 }
        sl_price: { type: number, description: 止损价 }
        tp_type: { type: string, enum: [limit, market] }
        sl_type: { type: string, enum: [limit, market] }

    IcebergOrderRequest:
      type: object
      required: [symbol, side, total_quantity, visible_quantity, price]
      properties:
        symbol: { type: string }
        side: { type: string, enum: [buy, sell] }
        total_quantity: { type: number }
        visible_quantity: { type: number }
        price: { type: number }

    # ── Strategy ──
    StrategyConfig:
      type: object
      required: [name, strategy_type, symbol]
      properties:
        name:
          type: string
        strategy_type:
          type: string
          enum: [breakout, ema_cross, macd, rsi, bollinger_bands, atr_trailing_stop, dual_thrust, renko, grid_trading, arbitrage, market_making, martingale, wallstreet]
        symbol:
          type: string
        interval:
          type: string
          default: 1h
        params:
          type: object
        enabled:
          type: boolean
          default: false

    StrategyTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        strategy_type:
          type: string
        description:
          type: string
        default_params:
          type: object

    ComboConfig:
      type: object
      required: [name, strategies]
      properties:
        name:
          type: string
        strategies:
          type: array
          items: { type: string }
        allocation:
          type: object
          description: 各策略资金分配比例
        rebalance:
          type: boolean
          default: false

    # ── Backtest ──
    BacktestRequest:
      type: object
      required: [symbol, interval, start_date, end_date, initial_balance]
      properties:
        symbol:
          type: string
          example: BTCUSDT
        interval:
          type: string
          example: 1h
        start_date:
          type: string
          format: date
          example: '2024-01-01'
        end_date:
          type: string
          format: date
          example: '2024-06-01'
        initial_balance:
          type: number
          default: 10000
        strategy_type:
          type: string
        strategy_config:
          type: object
        fee_rate:
          type: number
          default: 0.001

    BacktestResult:
      type: object
      properties:
        id:
          type: string
        strategy_id:
          type: string
        symbol:
          type: string
        start_date:
          type: string
        end_date:
          type: string
        initial_capital:
          type: number
        final_equity:
          type: number
        total_return_pct:
          type: number
        max_drawdown_pct:
          type: number
        sharpe_ratio:
          type: number
        win_rate:
          type: number
        profit_factor:
          type: number
        total_trades:
          type: integer
        trades:
          type: array
          items:
            $ref: '#/components/schemas/BacktestTrade'
        equity_curve:
          type: array
          items:
            type: object
            properties:
              time: { type: integer }
              equity: { type: number }
        report:
          type: object

    BacktestTrade:
      type: object
      properties:
        id:
          type: string
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        entry_price:
          type: number
        exit_price:
          type: number
        quantity:
          type: number
        pnl:
          type: number
        pnl_pct:
          type: number
        entry_time:
          type: integer
        exit_time:
          type: integer

    # ── Common ──
    Error:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
        code:
          type: string
        request_id:
          type: string

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: 未授权（Token 无效或过期）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

openapi: 3.0.3
info:
  title: 小田量化 (XiaoTianQuant) API
  description: |
    小田量化交易系统 REST API 文档。
    覆盖交易所适配、策略回测、风控、AI 分析、社交交易与链上数据等完整链路。
  version: 2.0.0
  contact:
    name: XiaoTianQuant Team

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境
  - url: https://api.xiaotianquant.com/api
    description: 生产环境

security:
  - BearerAuth: []

paths:
  # ═════════════════════════════════════════════════════════════════
  # Auth
  # ═════════════════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新访问令牌
      responses:
        '200':
          description: 新令牌

  # ═════════════════════════════════════════════════════════════════
  # Market Data (Public)
  # ═════════════════════════════════════════════════════════════════
  /klines/{symbol}:
    get:
      tags: [Market]
      summary: K 线数据
      security: []
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string, example: BTCUSDT }
        - name: interval
          in: query
          schema: { type: string, default: 1h, example: 1h }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
      responses:
        '200':
          description: K 线数组
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KlineBar'

  /market/klines:
    get:
      tags: [Market]
      summary: 市场 K 线（批量）
      security: []
      parameters:
        - name: symbols
          in: query
          schema: { type: string, example: BTCUSDT,ETHUSDT }
        - name: interval
          in: query
          schema: { type: string, default: 1h }
      responses:
        '200':
          description: 多标的 K 线数据

  /market/orderbook:
    get:
      tags: [Market]
      summary: 订单簿深度
      security: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 500 }
      responses:
        '200':
          description: 订单簿快照
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderBook'

  /market/trades:
    get:
      tags: [Market]
      summary: 最近成交
      security: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: 成交记录列表

  /market/snapshot:
    get:
      tags: [Market]
      summary: 市场快照（支持多态路由）
      description: |
        根据 `symbol` 参数智能返回不同数据：
        - 普通 symbol（如 `BTCUSDT`）→ 24h ticker
        - `SENTIMENT` → 恐惧贪婪/VIX/DXY
        - `CALENDAR` → 经济日历
        - 逗号分隔（如 `SPX,NDX,DJI`）→ 全球指数
      security: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            example: BTCUSDT
      responses:
        '200':
          description: 市场快照数据

  /symbols/search:
    get:
      tags: [Market]
      summary: 交易对搜索
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 匹配的交易对列表

  /status:
    get:
      tags: [System]
      summary: 系统状态
      security: []
      responses:
        '200':
          description: 系统运行状态

  # ═════════════════════════════════════════════════════════════════
  # Orders
  # ═════════════════════════════════════════════════════════════════
  /orders:
    get:
      tags: [Orders]
      summary: 获取当前委托
      parameters:
        - name: symbol
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [open, filled, cancelled, all] }
      responses:
        '200':
          description: 订单列表
    post:
      tags: [Orders]
      summary: 下单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '200':
          description: 下单结果
        '400':
          $ref: '#/components/responses/BadRequest'

  /orders/{order_id}:
    delete:
      tags: [Orders]
      summary: 撤单
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 撤单成功
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/cancel-all:
    post:
      tags: [Orders]
      summary: 全部撤单
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol:
                  type: string
      responses:
        '200':
          description: 批量撤单结果

  /orders/history:
    get:
      tags: [Orders]
      summary: 历史委托
      parameters:
        - name: symbol
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: 历史订单列表

  # ── OCO ──
  /orders/oco:
    get:
      tags: [Orders, Advanced]
      summary: 查询 OCO 订单列表
      responses:
        '200':
          description: OCO 订单列表
    post:
      tags: [Orders, Advanced]
      summary: 创建 OCO 订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCOOrderRequest'
      responses:
        '200':
          description: 创建成功

  /orders/oco/{id}:
    get:
      tags: [Orders, Advanced]
      summary: 获取 OCO 订单详情
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OCO 详情
    delete:
      tags: [Orders, Advanced]
      summary: 取消 OCO 订单
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 取消成功

  # ── Bracket ──
  /orders/bracket:
    get:
      tags: [Orders, Advanced]
      summary: 查询 Bracket 订单列表
      responses:
        '200':
          description: Bracket 订单列表
    post:
      tags: [Orders, Advanced]
      summary: 创建 Bracket 订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BracketOrderRequest'
      responses:
        '200':
          description: 创建成功

  /orders/bracket/{id}:
    get:
      tags: [Orders, Advanced]
      summary: 获取 Bracket 订单详情
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Bracket 详情
    delete:
      tags: [Orders, Advanced]
      summary: 取消 Bracket 订单
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 取消成功

  /orders/bracket/calculate:
    post:
      tags: [Orders, Advanced]
      summary: 计算 Bracket 参数
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry_price:
                  type: number
                side:
                  type: string
                  enum: [buy, sell]
      responses:
        '200':
          description: 计算结果

  # ── Iceberg ──
  /orders/iceberg:
    get:
      tags: [Orders, Advanced]
      summary: 查询 Iceberg 订单列表
      responses:
        '200':
          description: Iceberg 订单列表
    post:
      tags: [Orders, Advanced]
      summary: 创建 Iceberg 订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IcebergOrderRequest'
      responses:
        '200':
          description: 创建成功

  /orders/iceberg/{id}:
    get:
      tags: [Orders, Advanced]
      summary: 获取 Iceberg 订单详情
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Iceberg 详情
    delete:
      tags: [Orders, Advanced]
      summary: 取消 Iceberg 订单
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 取消成功

  # ═════════════════════════════════════════════════════════════════
  # Account
  # ═════════════════════════════════════════════════════════════════
  /account/balance:
    get:
      tags: [Account]
      summary: 账户余额
      responses:
        '200':
          description: 各币种余额

  /account/transfer:
    post:
      tags: [Account]
      summary: 资金划转
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                to:
                  type: string
                asset:
                  type: string
                amount:
                  type: number
      responses:
        '200':
          description: 划转结果

  /trades:
    get:
      tags: [Account]
      summary: 成交历史
      parameters:
        - name: symbol
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: 成交记录

  # ═════════════════════════════════════════════════════════════════
  # Strategy
  # ═════════════════════════════════════════════════════════════════
  /strategies/configs:
    get:
      tags: [Strategy]
      summary: 策略配置列表
      responses:
        '200':
          description: 策略配置数组
    post:
      tags: [Strategy]
      summary: 创建策略配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategyConfig'
      responses:
        '200':
          description: 创建成功

  /strategies/configs/{id}:
    get:
      tags: [Strategy]
      summary: 获取策略配置
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 策略配置详情
    put:
      tags: [Strategy]
      summary: 更新策略配置
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategyConfig'
      responses:
        '200':
          description: 更新成功
    delete:
      tags: [Strategy]
      summary: 删除策略配置
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 删除成功

  /strategies/configs/{id}/start:
    post:
      tags: [Strategy]
      summary: 启动策略
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 启动结果

  /strategies/configs/{id}/stop:
    post:
      tags: [Strategy]
      summary: 停止策略
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 停止结果

  /strategies/logs:
    get:
      tags: [Strategy]
      summary: 策略日志
      parameters:
        - name: id
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        '200':
          description: 日志列表

  /strategies/templates:
    get:
      tags: [Strategy]
      summary: 策略模板列表
      responses:
        '200':
          description: 模板数组
    post:
      tags: [Strategy]
      summary: 创建策略模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategyTemplate'
      responses:
        '200':
          description: 创建成功

  /strategies/ranking:
    get:
      tags: [Strategy]
      summary: 策略排行榜
      responses:
        '200':
          description: 排名列表

  /strategies/spot:
    get:
      tags: [Strategy]
      summary: 现货策略列表
      responses:
        '200':
          description: 现货策略

  /strategies/contract:
    get:
      tags: [Strategy]
      summary: 合约策略列表
      responses:
        '200':
          description: 合约策略

  /strategies/global:
    get:
      tags: [Strategy]
      summary: 获取全局策略配置
      responses:
        '200':
          description: 全局配置

  /strategies/param-defs:
    get:
      tags: [Strategy]
      summary: 策略参数定义
      responses:
        '200':
          description: 参数定义列表

  # ═════════════════════════════════════════════════════════════════
  # Combo
  # ═════════════════════════════════════════════════════════════════
  /combos:
    get:
      tags: [Combo]
      summary: 组合策略列表
      responses:
        '200':
          description: 组合列表
    post:
      tags: [Combo]
      summary: 创建组合策略
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComboConfig'
      responses:
        '200':
          description: 创建成功

  /combos/{id}:
    get:
      tags: [Combo]
      summary: 获取组合策略
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 组合详情
    put:
      tags: [Combo]
      summary: 更新组合策略
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComboConfig'
      responses:
        '200':
          description: 更新成功
    delete:
      tags: [Combo]
      summary: 删除组合策略
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 删除成功

  /combos/{id}/start:
    post:
      tags: [Combo]
      summary: 启动组合
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 启动结果

  /combos/{id}/stop:
    post:
      tags: [Combo]
      summary: 停止组合
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 停止结果

  /combos/{id}/signals:
    get:
      tags: [Combo]
      summary: 组合信号
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 信号列表

  # ═════════════════════════════════════════════════════════════════
  # Backtest
  # ═════════════════════════════════════════════════════════════════
  /backtest/run:
    post:
      tags: [Backtest]
      summary: 运行回测
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestRequest'
      responses:
        '200':
          description: 回测结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestResult'

  /native/backtest:
    post:
      tags: [Backtest]
      summary: 原生回测（Rust 引擎）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestRequest'
      responses:
        '200':
          description: 回测结果

  # ═════════════════════════════════════════════════════════════════
  # Portfolio
  # ═════════════════════════════════════════════════════════════════
  /portfolio/summary:
    get:
      tags: [Portfolio]
      summary: 资产总览
      responses:
        '200':
          description: 资产摘要

  /portfolio/positions:
    get:
      tags: [Portfolio]
      summary: 持仓列表
      responses:
        '200':
          description: 持仓详情

  /portfolio/snapshots:
    get:
      tags: [Portfolio]
      summary: 权益曲线快照
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: 快照数组

  /portfolio/calendar:
    get:
      tags: [Portfolio]
      summary: 盈亏日历
      parameters:
        - name: year
          in: query
          schema: { type: integer }
        - name: month
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: 月度盈亏日历

  # ═════════════════════════════════════════════════════════════════
  # AI
  # ═════════════════════════════════════════════════════════════════
  /ai/snapshot:
    get:
      tags: [AI]
      summary: AI 市场快照
      parameters:
        - name: symbol
          in: query
          schema: { type: string, default: BTCUSDT }
        - name: interval
          in: query
          schema: { type: string, default: 1h }
      responses:
        '200':
          description: AI 分析快照

  /ai/generate:
    post:
      tags: [AI]
      summary: AI 生成策略代码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                symbol:
                  type: string
                interval:
                  type: string
      responses:
        '200':
          description: 生成的代码

  /ai/multi-agent:
    post:
      tags: [AI]
      summary: 多智能体分析
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol:
                  type: string
                agents:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: 多智能体分析结果

  /ai/backtest:
    post:
      tags: [AI]
      summary: AI 回测
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestRequest'
      responses:
        '200':
          description: 回测结果

  /ai/chat:
    post:
      tags: [AI]
      summary: AI 聊天
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                history:
                  type: array
                  items:
                    type: object
                    properties:
                      role: { type: string }
                      content: { type: string }
      responses:
        '200':
          description: AI 回复

  /ai/analyze:
    post:
      tags: [AI]
      summary: AI 深度分析
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol:
                  type: string
                type:
                  type: string
                  enum: [technical, fundamental, sentiment, risk]
      responses:
        '200':
          description: 分析报告

  /ai/quickscan:
    get:
      tags: [AI]
      summary: 快速扫描
      parameters:
        - name: symbol
          in: query
          schema: { type: string }
      responses:
        '200':
          description: 扫描结果

  /ai/optimize:
    post:
      tags: [AI]
      summary: AI 参数优化
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                strategy_id:
                  type: string
                params:
                  type: object
      responses:
        '200':
          description: 优化结果

  /ai/deploy:
    post:
      tags: [AI]
      summary: AI 策略部署
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                symbol:
                  type: string
      responses:
        '200':
          description: 部署结果

  /ai/validate:
    post:
      tags: [AI]
      summary: AI 策略验证
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
      responses:
        '200':
          description: 验证结果

  /ai/fix:
    post:
      tags: [AI]
      summary: AI 策略修复
      requestBody:
        required: true
        content:
          application/json:

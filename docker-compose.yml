version: "3.9"

# ═══════════════════════════════════════════════════════════════════
# XiaoTianQuant v3.0 — Development Compose
# ═══════════════════════════════════════════════════════════════════

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-}
    container_name: xiaotian-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      # Exchange API keys
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_API_SECRET=${OKX_API_SECRET:-}
      # AI provider keys
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Notification channels (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TO=${SMTP_TO:-}
      - LARK_WEBHOOK=${LARK_WEBHOOK:-}
      - LARK_SIGNING_KEY=${LARK_SIGNING_KEY:-}
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK:-}
      - DINGTALK_SECRET=${DINGTALK_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Cache (optional Redis)
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - REDIS_URL=${REDIS_URL:-}
      # Sandbox
      - SANDBOX_URL=http://sandbox:9000
      # ML Server & CCXT Bridge
      - ML_SERVER_URL=http://ml_server:8001
      - CCXT_BRIDGE_URL=http://ccxt_bridge:8002
      # Discord (optional)
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY:-}
    volumes:
      - gateway_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      sandbox:
        condition: service_healthy
      ml_server:
        condition: service_healthy
        required: false
      ccxt_bridge:
        condition: service_healthy
        required: false
    networks:
      - xiaotian
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: xiaotian-sandbox
    ports:
      - "9000:9000"
    environment:
      - SANDBOX_PORT=9000
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - xiaotian
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ml_server:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: xiaotian-ml-server
    command: python -m uvicorn ml_server.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./sandbox:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - xiaotian

  ccxt_bridge:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: xiaotian-ccxt-bridge
    command: python -m uvicorn ccxt_bridge.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./sandbox:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - xiaotian

  redis:
    image: redis:7-alpine
    container_name: xiaotian-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - xiaotian
    profiles:
      - cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gateway_data:
  redis_data:

networks:
  xiaotian:
    driver: bridge

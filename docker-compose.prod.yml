version: "3.9"

# ═══════════════════════════════════════════════════════════════════
# XiaoTianQuant v3.0 — Production Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-prod}
    image: xiaotian-quant/gateway:${VERSION:-latest}
    container_name: xiaotian-gateway
    ports:
      - "127.0.0.1:8080:8080"  # Bind to localhost; expose via reverse proxy
    environment:
      - PORT=8080
      - GIN_MODE=release
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - CACHE_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - SANDBOX_URL=http://sandbox:9000
      # Secrets should be injected via .env or Docker secrets
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - gateway_data:/app/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    networks:
      - xiaotian
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: xiaotian-quant/sandbox:${VERSION:-latest}
    container_name: xiaotian-sandbox
    expose:
      - "9000"
    environment:
      - SANDBOX_PORT=9000
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - xiaotian
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: xiaotian-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - xiaotian
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy + SSL termination
  nginx:
    image: nginx:alpine
    container_name: xiaotian-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    restart: always
    depends_on:
      - gateway
    networks:
      - xiaotian
    profiles:
      - nginx

volumes:
  gateway_data:
  redis_data:
  nginx_cache:

networks:
  xiaotian:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
